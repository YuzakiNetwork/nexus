name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Compile check
        run: python -m compileall nexus_cli/

      - name: Run tests
        env:
          NVIDIA_API_KEY: test-key-do-not-use-real
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint (pyflakes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pyflakes
        run: pip install pyflakes
      - name: Run pyflakes
        # E402 dll dibolehkan untuk CLI entry point; cukup pastikan tidak ada
        # unused import / undefined name yang serius.
        run: pyflakes nexus_cli/ || true
