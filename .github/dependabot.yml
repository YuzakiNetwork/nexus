version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
      include-scope: true
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    # Hanya requests untuk saat ini
    allow:
      - dependency-name: "requests"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "dependencies"
    open-pull-requests-limit: 3
